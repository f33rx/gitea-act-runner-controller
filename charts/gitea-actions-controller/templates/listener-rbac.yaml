apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-listener
  namespace: {{ .Release.Namespace }}
---
{{- if .Values.rbac.clusterScope }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-listener
rules:
{{- include "gitea-actions-controller.listenerRules" . | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-listener
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-listener
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-listener
    namespace: {{ .Release.Namespace }}
{{- else }}
{{- range .Values.rbac.watchNamespaces }}
{{- $ns := tpl . $ }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $.Release.Name }}-listener
  namespace: {{ $ns }}
rules:
{{- include "gitea-actions-controller.listenerRules" $ | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Release.Name }}-listener
  namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $.Release.Name }}-listener
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-listener
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
