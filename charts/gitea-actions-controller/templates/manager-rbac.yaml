apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-manager
  namespace: {{ .Release.Namespace }}
---
{{- if .Values.rbac.clusterScope }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-manager
rules:
{{- include "gitea-actions-controller.managerRules" . | nindent 0 }}
{{- if .Values.manager.leaderElection.enabled }}
{{- include "gitea-actions-controller.leaderElectionRules" . | nindent 0 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-manager
    namespace: {{ .Release.Namespace }}
{{- else }}
{{- range .Values.rbac.watchNamespaces }}
{{- $ns := tpl . $ }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $.Release.Name }}-manager
  namespace: {{ $ns }}
rules:
{{- include "gitea-actions-controller.managerRules" $ | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $.Release.Name }}-manager
  namespace: {{ $ns }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $.Release.Name }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-manager
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- if .Values.manager.leaderElection.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-manager-leader-election
  namespace: {{ .Release.Namespace }}
rules:
{{- include "gitea-actions-controller.leaderElectionRules" . | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-manager-leader-election
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-manager-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-manager
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
