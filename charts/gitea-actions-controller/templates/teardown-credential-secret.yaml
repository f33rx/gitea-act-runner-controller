{{- if .Values.teardownCredential.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.teardownCredential.secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  token: {{ required "teardownCredential.token is required when teardownCredential.create is true" .Values.teardownCredential.token | quote }}
{{- end }}
