apiVersion: v1
kind: Namespace
metadata:
  name: gitea-actions-controller
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-teardown-credential
  namespace: gitea-actions-controller
type: Opaque
stringData:
  token: "PLACEHOLDER_REPLACE_WITH_ORG_WRITE_TOKEN"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-runner-controller
  namespace: gitea-actions-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gitea-runner-controller
rules:
# EphemeralRunner
- apiGroups: ["giteaactions.blackrabbit.dev"]
  resources: ["ephemeralrunners"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["giteaactions.blackrabbit.dev"]
  resources: ["ephemeralrunners/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["giteaactions.blackrabbit.dev"]
  resources: ["ephemeralrunners/finalizers"]
  verbs: ["update"]
# GiteaRunnerSet
- apiGroups: ["giteaactions.blackrabbit.dev"]
  resources: ["gitearunnersets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["giteaactions.blackrabbit.dev"]
  resources: ["gitearunnersets/status"]
  verbs: ["get", "update", "patch"]
# EphemeralRunnerSet
- apiGroups: ["giteaactions.blackrabbit.dev"]
  resources: ["ephemeralrunnersets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["giteaactions.blackrabbit.dev"]
  resources: ["ephemeralrunnersets/status"]
  verbs: ["get", "update", "patch"]
# Core resources
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch"]
# Leader election (--leader-elect): the manager acquires a Lease and records
# leadership transitions as Events.
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gitea-runner-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gitea-runner-controller
subjects:
- kind: ServiceAccount
  name: gitea-runner-controller
  namespace: gitea-actions-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea-runner-controller
  namespace: gitea-actions-controller
  labels:
    app: gitea-runner-controller
spec:
  # ADR 0009: 2 replicas, active-standby via leader election (--leader-elect below).
  # Not more -- controller-runtime leader election is active-standby, not
  # active-active, so a third replica adds cost with no additional safety.
  replicas: 2
  selector:
    matchLabels:
      app: gitea-runner-controller
  template:
    metadata:
      labels:
        app: gitea-runner-controller
    spec:
      serviceAccountName: gitea-runner-controller
      # ADR 0009 Decision 4: must exceed the manager's GracefulShutdownTimeout (30s)
      # so the kubelet does not SIGKILL mid-drain; a small margin absorbs the
      # process's own shutdown bookkeeping on top of the drain itself.
      terminationGracePeriodSeconds: 40
      containers:
      - name: controller
        image: gitea-runner-controller:latest
        imagePullPolicy: Never
        args:
        # ADR 0009: enabled by default in the shipped manifest, including for the
        # single-replica local-dev flow -- exercising the same code path in dev as
        # production avoids an HA-only path that stays untested until production.
        - --leader-elect=true
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 8081
          name: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
