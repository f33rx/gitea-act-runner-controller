---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: ephemeralrunners.giteaactions.blackrabbit.dev
spec:
  group: giteaactions.blackrabbit.dev
  names:
    kind: EphemeralRunner
    listKind: EphemeralRunnerList
    plural: ephemeralrunners
    shortNames:
    - er
    - ers
    singular: ephemeralrunner
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: EphemeralRunner is the Schema for the ephemeralrunners API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EphemeralRunnerSpec defines the desired state of an EphemeralRunner.
            properties:
              activeDeadlineSeconds:
                description: |-
                  ActiveDeadlineSeconds is the resolved hard cap on total pod lifetime (ADR 0008),
                  copied down from the GiteaRunnerSet override or the manager default at creation
                  time so each EphemeralRunner is self-describing. Applied to the Pod spec verbatim;
                  the kubelet enforces it.
                format: int64
                type: integer
              giteaConfigUrl:
                description: GiteaConfigURL is the URL of the Gitea instance.
                type: string
              giteaRunnerSetName:
                description: GiteaRunnerSetName is the name of the parent GiteaRunnerSet.
                type: string
              labels:
                description: Labels are the runner labels.
                items:
                  type: string
                type: array
              orgName:
                description: OrgName is the Gitea organization name (for org-scoped
                  runners).
                type: string
              pendingTimeout:
                description: |-
                  PendingTimeout is the resolved pre-claim (Pending) timeout (ADR 0008), copied down
                  from the GiteaRunnerSet override or the manager default at creation time.
                type: string
              registrationToken:
                description: RegistrationToken is the per-pod registration token (from
                  Secret).
                type: string
              runnerScope:
                description: 'RunnerScope is the scope of the runner: org or instance.'
                type: string
              stallWindow:
                description: |-
                  StallWindow is the resolved stall-detection window (ADR 0008), copied down from
                  the GiteaRunnerSet override or the manager default at creation time.
                type: string
            required:
            - giteaConfigUrl
            - giteaRunnerSetName
            - labels
            - orgName
            - registrationToken
            - runnerScope
            type: object
          status:
            description: EphemeralRunnerStatus defines the observed state of an EphemeralRunner.
            properties:
              jobRef:
                description: JobRef is the current task/job the runner claimed.
                type: string
              lastJobLogSize:
                description: |-
                  LastJobLogSize is the Gitea job-log Content-Length observed at LastProgressTime,
                  used to detect growth on the next check via a cheap header-only comparison instead
                  of re-downloading and diffing the full (growing) log body.
                format: int64
                type: integer
              lastObservedTime:
                description: LastObservedTime is the last time the runner's phase
                  or reason changed.
                format: date-time
                type: string
              lastProgressTime:
                description: |-
                  LastProgressTime is the last time the runner's claimed Gitea job log grew (ADR
                  0008's stall-detection liveness signal for a Running runner: any new step output
                  means the job is doing something, whether or not the pod phase itself changed).
                  act_runner streams step output to Gitea via its own protocol independent of the
                  runner container's stdout, so this is read from Gitea's job-log endpoint, not
                  kubectl logs. A Running runner with no LastProgressTime movement for the
                  configured stall window is presumed stuck.
                format: date-time
                type: string
              phase:
                description: Phase is the current phase of the runner.
                type: string
              phaseStartTime:
                description: |-
                  PhaseStartTime is when the runner entered its current Phase. ADR 0008 uses this
                  to measure how long a runner has been Pending (pre-claim timeout), independent of
                  unrelated Reason-only status updates that also bump LastObservedTime.
                format: date-time
                type: string
              podName:
                description: PodName is the name of the associated Pod.
                type: string
              reason:
                description: Reason is a message explaining the current phase.
                type: string
              runnerId:
                description: RunnerID is the Gitea runner ID assigned at registration.
                format: int64
                type: integer
              runnerUUID:
                description: RunnerUUID is the Gitea runner UUID assigned at registration.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
