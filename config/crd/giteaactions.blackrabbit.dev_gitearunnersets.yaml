---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: gitearunnersets.giteaactions.blackrabbit.dev
spec:
  group: giteaactions.blackrabbit.dev
  names:
    kind: GiteaRunnerSet
    listKind: GiteaRunnerSetList
    plural: gitearunnersets
    shortNames:
    - grs
    - grsets
    singular: gitearunnerset
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: GiteaRunnerSet is the Schema for the gitearunnersets API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GiteaRunnerSetSpec defines the desired state of GiteaRunnerSet.
            properties:
              activeDeadlineSeconds:
                description: |-
                  ActiveDeadlineSeconds overrides the manager-wide default hard cap on total runner
                  pod lifetime (ADR 0008). Set as the Pod's activeDeadlineSeconds; the kubelet
                  enforces it independent of any operator logic. Omit to use the manager default.
                format: int64
                type: integer
              giteaConfigSecretRef:
                description: GiteaConfigSecretRef is a reference to the Secret containing
                  the Gitea operator credential.
                properties:
                  key:
                    description: Key within the Secret whose value is the credential.
                    type: string
                  name:
                    description: Name of the referent Secret (same namespace as the
                      GiteaRunnerSet).
                    type: string
                  optional:
                    description: Optional marks whether the Secret or its key must
                      exist.
                    type: boolean
                required:
                - key
                - name
                type: object
              giteaConfigUrl:
                description: GiteaConfigURL is the URL of the Gitea instance.
                type: string
              labels:
                description: Labels are the runner labels (e.g., ubuntu-latest, dind).
                items:
                  type: string
                type: array
              maxRunners:
                description: MaxRunners is the maximum number of ephemeral runners
                  to create.
                format: int32
                type: integer
              minRunners:
                description: MinRunners is the minimum number of idle ephemeral runners
                  to keep.
                format: int32
                type: integer
              orgName:
                description: OrgName is the Gitea organization name (for org-scoped
                  runners).
                type: string
              pendingTimeout:
                description: |-
                  PendingTimeout overrides the manager-wide default for how long a runner may stay
                  Pending (never claimed a job) before the operator treats pod creation as failed
                  and retries with capped backoff (ADR 0008). Omit to use the manager default.
                type: string
              runnerScope:
                description: 'RunnerScope is the scope of the runner: org or instance.'
                enum:
                - org
                - instance
                type: string
              stallWindow:
                description: |-
                  StallWindow overrides the manager-wide default stall-detection window (ADR 0008):
                  how long a Running runner may show no progress signal (pod-phase/condition
                  transitions) before the operator treats the job as stuck, fails it, and tears the
                  runner down. Omit to use the manager default.
                type: string
              template:
                description: |-
                  Template is the pod template spec for the runner pods (a corev1.PodTemplateSpec).
                  Held as a RawExtension with preserved unknown fields so controller-gen emits a
                  structural schema (x-kubernetes-preserve-unknown-fields) rather than a $ref to the
                  embedded core type. Not consumed yet; optional.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - giteaConfigSecretRef
            - giteaConfigUrl
            - labels
            - orgName
            - runnerScope
            type: object
          status:
            description: GiteaRunnerSetStatus defines the observed state of GiteaRunnerSet.
            properties:
              availableReplicas:
                description: AvailableReplicas is the number of available runner pods.
                format: int32
                type: integer
              readyReplicas:
                description: ReadyReplicas is the number of ready runner pods.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
