apiVersion: giteaactions.blackrabbit.dev/v1alpha1
kind: GiteaRunnerSet
metadata:
  name: garc-dev-echo
  namespace: default
spec:
  giteaConfigUrl: http://gitea-http.gitea.svc.cluster.local:3000
  giteaConfigSecretRef:
    name: gitea-runner-creds
    key: token
  runnerScope: org
  orgName: garc-dev
  labels:
    - "ubuntu-latest"
  minRunners: 0
  maxRunners: 10
  template:
    spec:
      serviceAccountName: gitea-runner
      restartPolicy: Never
      containers:
      - name: act-runner
        image: gitea/act_runner:0.2.13
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 2
            memory: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-runner-creds
  namespace: default
type: Opaque
stringData:
  token: "YOUR_ORG_TOKEN_HERE"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-runner
  namespace: default
